version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: nightmare-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nightmare}
      POSTGRES_USER: ${POSTGRES_USER:-nightmare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nightmare} -d ${POSTGRES_DB:-nightmare}"]
      interval: 10s
      timeout: 5s
      retries: 6

  server:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        COORDINATOR_BASE_URL: ${COORDINATOR_BASE_URL}
        COORDINATOR_API_TOKEN: ${COORDINATOR_API_TOKEN}
        DATABASE_URL: postgresql://${POSTGRES_USER:-nightmare}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nightmare}
    image: nightmare:latest
    container_name: nightmare-coordinator-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ROLE: server
      DATABASE_URL: postgresql://${POSTGRES_USER:-nightmare}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nightmare}
      COORDINATOR_API_TOKEN: ${COORDINATOR_API_TOKEN:?set COORDINATOR_API_TOKEN}
    volumes:
      - ../output:/app/output
      - ../config:/app/config
      - ${TLS_CERT_FILE:?set TLS_CERT_FILE}:/run/tls/server.crt:ro
      - ${TLS_KEY_FILE:?set TLS_KEY_FILE}:/run/tls/server.key:ro
    ports:
      - "80:80"
      - "443:443"
    command:
      - server
      - --host
      - 0.0.0.0
      - --http-port
      - "80"
      - --https-port
      - "443"
      - --cert-file
      - /run/tls/server.crt
      - --key-file
      - /run/tls/server.key

volumes:
  postgres_data:
